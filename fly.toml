# fly.toml app configuration file generated for nfcbottlekanriapp on 2026-05-24T00:36:09+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nfcbottlekanriapp'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  DATABASE_URL = "sqlite:/data/bottles.db?mode=rwc"
  BIND_ADDR = "0.0.0.0:3000"

[[mounts]]
  source = "data"
  destination = "/data"
